site_name: QuantumStateObjects
site_description: Bounded, auditable Quantum State Object runtime research
site_url: https://aevespers2.github.io/QuantumStateObjects/
repo_url: https://github.com/aevespers2/QuantumStateObjects
repo_name: aevespers2/QuantumStateObjects
docs_dir: docs
strict: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Project overview: project-overview.md
  - A.L.I.S.T.A.I.R.E. integration: alistaire-integration.md
  - Architecture: architecture.md
  - Design contracts: design-contracts.md
  - Developer guide: developer-guide.md
  - Security and trust: security.md
  - Operations and recovery: operations.md
  - Release status: release-status.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
