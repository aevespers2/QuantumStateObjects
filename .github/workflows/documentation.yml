name: Documentation

on:
  pull_request:
    paths:
      - 'README.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'deploy.md'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/documentation.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'deploy.md'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install pinned documentation dependencies
        run: |
          python -m pip install --disable-pip-version-check -r docs/requirements.txt
          python -m pip freeze --all | sort > documentation-dependencies.txt

      - name: Build documentation strictly
        run: python -m mkdocs build --strict --clean

      - name: Validate generated site boundary
        run: |
          test -f site/index.html
          test -f site/sitemap.xml
          test -f site/search/search_index.json
          test ! -e site/.git
          ! grep -RIlE '(BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|gh[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,})' site

      - name: Record exact-head documentation evidence
        if: always()
        run: |
          mkdir -p reports/documentation/site
          if [ -d site ]; then cp -R site/. reports/documentation/site/; fi
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > reports/documentation/exact-head.txt
          python --version > reports/documentation/python-version.txt 2>&1
          python -m mkdocs --version > reports/documentation/mkdocs-version.txt 2>&1 || true
          cp documentation-dependencies.txt reports/documentation/dependencies.txt 2>/dev/null || true
          find reports/documentation -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > reports/documentation/SHA256SUMS

      - name: Upload documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: documentation-${{ github.event.pull_request.head.sha || github.sha }}
          path: reports/documentation
          if-no-files-found: error
          retention-days: 90
