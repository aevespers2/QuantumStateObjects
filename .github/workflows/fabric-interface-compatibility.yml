name: Fabric Interface Compatibility Consumer

on:
  push:
    branches: [main, "docs/**"]
    paths:
      - contracts/qso-interface-source-tuple-v1.json
      - fixtures/qso-interface-compatibility-v1.json
      - tools/validate_fabric_interface_compatibility.py
      - tests/test_fabric_interface_compatibility.py
      - docs/ecosystem-interface-compatibility.md
      - docs/ecosystem-interface-compatibility-v0.json
      - docs/ecosystem-interface-compatibility-review-checklist.md
      - docs/decisions/0001-ecosystem-interface-compatibility-boundary.md
      - mkdocs.yml
      - .github/workflows/fabric-interface-compatibility.yml
  pull_request:
    paths:
      - contracts/qso-interface-source-tuple-v1.json
      - fixtures/qso-interface-compatibility-v1.json
      - tools/validate_fabric_interface_compatibility.py
      - tests/test_fabric_interface_compatibility.py
      - docs/ecosystem-interface-compatibility.md
      - docs/ecosystem-interface-compatibility-v0.json
      - docs/ecosystem-interface-compatibility-review-checklist.md
      - docs/decisions/0001-ecosystem-interface-compatibility-boundary.md
      - mkdocs.yml
      - .github/workflows/fabric-interface-compatibility.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fabric-interface-consumer-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EXPECTED_FIXTURE_BLOB: 143b80448cb4623682669ab8e6a9599239dd5847
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          persist-credentials: false

      - name: Assert exact clean source and producer bytes
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test -z "$(git status --porcelain)"
          test "$(git hash-object fixtures/qso-interface-compatibility-v1.json)" = "$EXPECTED_FIXTURE_BLOB"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Run independent hostile regressions
        id: tests
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/fabric-interface-consumer-evidence"
          mkdir -p "$evidence"
          python -m unittest -v tests/test_fabric_interface_compatibility.py \
            2>&1 | tee "$evidence/tests.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate immutable tuple and corpus independently
        id: validator
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/fabric-interface-consumer-evidence"
          python tools/validate_fabric_interface_compatibility.py \
            fixtures/qso-interface-compatibility-v1.json \
            contracts/qso-interface-source-tuple-v1.json \
            --repository-root . \
            2>&1 | tee "$evidence/validator.json"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compile consumer outside source tree
        id: compile
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/fabric-interface-consumer-evidence"
          python - <<'PY' >"$evidence/compile.log" 2>&1
          import os
          import py_compile

          py_compile.compile(
              "tools/validate_fabric_interface_compatibility.py",
              cfile=os.path.join(os.environ["RUNNER_TEMP"], "validate_fabric_interface_compatibility.pyc"),
              doraise=True,
          )
          PY
          status=$?
          cat "$evidence/compile.log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate deterministic evidence
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          VALIDATOR_STATUS: ${{ steps.validator.outputs.status }}
          COMPILE_STATUS: ${{ steps.compile.outputs.status }}
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/fabric-interface-consumer-evidence"
          mkdir -p "$evidence"
          printf '%s\n' "$EXPECTED_HEAD_SHA" > "$evidence/exact-head.txt"
          printf '%s\n' "$EXPECTED_FIXTURE_BLOB" > "$evidence/expected-fixture-blob.txt"
          git hash-object fixtures/qso-interface-compatibility-v1.json > "$evidence/actual-fixture-blob.txt"
          python --version > "$evidence/python-version.txt" 2>&1
          git status --porcelain > "$evidence/worktree-status.txt"
          sha256sum \
            contracts/qso-interface-source-tuple-v1.json \
            fixtures/qso-interface-compatibility-v1.json \
            tools/validate_fabric_interface_compatibility.py \
            tests/test_fabric_interface_compatibility.py \
            docs/ecosystem-interface-compatibility.md \
            docs/ecosystem-interface-compatibility-v0.json \
            docs/ecosystem-interface-compatibility-review-checklist.md \
            docs/decisions/0001-ecosystem-interface-compatibility-boundary.md \
            mkdocs.yml \
            .github/workflows/fabric-interface-compatibility.yml \
            > "$evidence/source-sha256.txt"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence = Path(os.environ["RUNNER_TEMP"]) / "fabric-interface-consumer-evidence"
          summary = {
              "expected_head_sha": os.environ["EXPECTED_HEAD_SHA"],
              "producer_head_sha": "25036a5cfcea79e204a4660ddd1af09c054935b1",
              "fixture_git_blob": os.environ["EXPECTED_FIXTURE_BLOB"],
              "test_status": int(os.environ.get("TEST_STATUS") or 1),
              "validator_status": int(os.environ.get("VALIDATOR_STATUS") or 1),
              "compile_status": int(os.environ.get("COMPILE_STATUS") or 1),
              "bounded_disposition": "EVIDENCE_SATISFIED_AT_RECORDED_SYNTHETIC_TUPLE",
              "real_interface_disposition": "BLOCKED_ROLE_COLLISION",
              "authority_effect": "none",
              "runtime_admission": False,
              "ecosystem_admission": False,
              "merge_authority": False,
              "publication_authority": False,
          }
          (evidence / "summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          find "$evidence" -type f ! -name evidence-sha256.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > "$evidence/evidence-sha256.txt"

      - name: Retain independent exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fabric-interface-consumer-${{ env.EXPECTED_HEAD_SHA }}
          path: ${{ runner.temp }}/fabric-interface-consumer-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Fail closed on any incomplete gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.tests.outputs.status }}" = "0"
          test "${{ steps.validator.outputs.status }}" = "0"
          test "${{ steps.compile.outputs.status }}" = "0"
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test "$(git hash-object fixtures/qso-interface-compatibility-v1.json)" = "$EXPECTED_FIXTURE_BLOB"
          test -z "$(git status --porcelain)"
