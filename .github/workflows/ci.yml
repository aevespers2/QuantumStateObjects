name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out exact head
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip setuptools wheel pytest
          python -m pip install -e . --no-build-isolation

      - name: Compile source and tests
        run: python -m compileall -q qso_runtime tests

      - name: Run unit tests
        run: python -m pytest

      - name: Verify installed CLI smoke
        run: |
          qso-run > qso-run.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("qso-run.json").read_text(encoding="utf-8"))
          assert payload["status"] == "ok"
          assert payload["boundaries"] == {
              "credentials_access": False,
              "executes_generated_code": False,
              "external_content": "data_only",
              "network_access": False,
              "repository_write": False,
          }
          PY
          qso-run --version

      - name: Build wheel without isolation
        run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist
