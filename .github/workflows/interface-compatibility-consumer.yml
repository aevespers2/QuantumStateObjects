name: Interface Compatibility Independent Consumer

on:
  push:
    branches:
      - docs/pages-architecture-onboarding
      - "health/**"
    paths:
      - contracts/qso-interface-compatibility-source-v1.json
      - tools/validate_interface_compatibility_consumer.py
      - tests/test_interface_compatibility_consumer.py
      - docs/interface-compatibility-consumer.md
      - .github/workflows/interface-compatibility-consumer.yml
      - mkdocs.yml
  pull_request:
    paths:
      - contracts/qso-interface-compatibility-source-v1.json
      - tools/validate_interface_compatibility_consumer.py
      - tests/test_interface_compatibility_consumer.py
      - docs/interface-compatibility-consumer.md
      - .github/workflows/interface-compatibility-consumer.yml
      - mkdocs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: interface-consumer-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PRODUCER_HEAD_SHA: 25036a5cfcea79e204a4660ddd1af09c054935b1
      PRODUCER_FIXTURE_SHA256: baac67caaa6b213e5a50019c8cad011be1e1906699c7903391313b11677ac5d4
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          persist-credentials: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Fetch immutable producer corpus
        id: fetch
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/interface-consumer-evidence"
          mkdir -p "$evidence"
          fixture="$RUNNER_TEMP/qso-interface-compatibility-v1.json"
          curl --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 --retry 3 --retry-all-errors \
            "https://raw.githubusercontent.com/aevespers2/QSO-FABRIC/$PRODUCER_HEAD_SHA/fixtures/qso-interface-compatibility-v1.json" \
            --output "$fixture" \
            2>"$evidence/fetch.log"
          status=$?
          if [ "$status" -eq 0 ]; then
            sha256sum "$fixture" | tee "$evidence/downloaded-source-sha256.txt"
            test "$(sha256sum "$fixture" | awk '{print $1}')" = "$PRODUCER_FIXTURE_SHA256"
            status=$?
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run independent hostile regressions
        id: tests
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/interface-consumer-evidence"
          python -m unittest -v tests/test_interface_compatibility_consumer.py \
            2>&1 | tee "$evidence/tests.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate immutable producer corpus independently
        id: corpus
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/interface-consumer-evidence"
          python tools/validate_interface_compatibility_consumer.py \
            "$RUNNER_TEMP/qso-interface-compatibility-v1.json" \
            --expected-sha256 "$PRODUCER_FIXTURE_SHA256" \
            2>&1 | tee "$evidence/validator.json"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compile validator outside source tree
        id: compile
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/interface-consumer-evidence"
          python - <<'PY' >"$evidence/compile.log" 2>&1
          import os
          import py_compile
          py_compile.compile(
              "tools/validate_interface_compatibility_consumer.py",
              cfile=os.path.join(os.environ["RUNNER_TEMP"], "validate_interface_compatibility_consumer.pyc"),
              doraise=True,
          )
          PY
          status=$?
          cat "$evidence/compile.log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate deterministic evidence
        if: always()
        shell: bash
        env:
          FETCH_STATUS: ${{ steps.fetch.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          CORPUS_STATUS: ${{ steps.corpus.outputs.status }}
          COMPILE_STATUS: ${{ steps.compile.outputs.status }}
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/interface-consumer-evidence"
          mkdir -p "$evidence"
          printf '%s\n' "$EXPECTED_HEAD_SHA" > "$evidence/exact-head.txt"
          printf '%s\n' "$PRODUCER_HEAD_SHA" > "$evidence/producer-head.txt"
          python --version > "$evidence/python-version.txt" 2>&1
          git status --porcelain > "$evidence/worktree-status.txt"
          sha256sum \
            contracts/qso-interface-compatibility-source-v1.json \
            tools/validate_interface_compatibility_consumer.py \
            tests/test_interface_compatibility_consumer.py \
            docs/interface-compatibility-consumer.md \
            .github/workflows/interface-compatibility-consumer.yml \
            mkdocs.yml \
            > "$evidence/consumer-source-sha256.txt"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          evidence = Path(os.environ["RUNNER_TEMP"]) / "interface-consumer-evidence"
          summary = {
              "consumer_head_sha": os.environ["EXPECTED_HEAD_SHA"],
              "producer_head_sha": os.environ["PRODUCER_HEAD_SHA"],
              "producer_fixture_sha256": os.environ["PRODUCER_FIXTURE_SHA256"],
              "fetch_status": int(os.environ.get("FETCH_STATUS") or 1),
              "test_status": int(os.environ.get("TEST_STATUS") or 1),
              "corpus_status": int(os.environ.get("CORPUS_STATUS") or 1),
              "compile_status": int(os.environ.get("COMPILE_STATUS") or 1),
              "contract_id": "QSO-INTERFACE-COMPATIBILITY-001",
              "implementation_independence": True,
              "authority_effect": "none",
              "ecosystem_admission": False,
              "execution_authority": False,
              "merge_authority": False,
              "publication_authority": False
          }
          (evidence / "summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8"
          )
          PY
          find "$evidence" -type f ! -name evidence-sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum > "$evidence/evidence-sha256.txt"

      - name: Retain exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: interface-consumer-${{ env.EXPECTED_HEAD_SHA }}
          path: ${{ runner.temp }}/interface-consumer-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Fail closed on any incomplete gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.fetch.outputs.status }}" = "0"
          test "${{ steps.tests.outputs.status }}" = "0"
          test "${{ steps.corpus.outputs.status }}" = "0"
          test "${{ steps.compile.outputs.status }}" = "0"
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test -z "$(git status --porcelain)"
