name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: qso-runtime-ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Initialize evidence and assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          mkdir -p "$evidence" "$RUNNER_TEMP/qso-runtime-dist"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'python_matrix=%s\n' "${{ matrix.python-version }}"
          } > "$evidence/source-identity.txt"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: ""

      - name: Install pinned package and test toolchain
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          python -m pip install \
            pip==25.1.1 \
            setuptools==80.9.0 \
            wheel==0.45.1 \
            pytest==8.4.2 \
            > "$evidence/install.log" 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python -m pip install -e . --no-build-isolation \
              >> "$evidence/install.log" 2>&1
            status=$?
          fi
          cat "$evidence/install.log"
          printf '%s\n' "$status" > "$evidence/install-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compile source and tests
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          python -m compileall -q qso_runtime tests \
            > "$evidence/compile.log" 2>&1
          status=$?
          cat "$evidence/compile.log"
          printf '%s\n' "$status" > "$evidence/compile-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          python -m pytest --junitxml="$evidence/pytest.xml" \
            > "$evidence/pytest.log" 2>&1
          status=$?
          cat "$evidence/pytest.log"
          printf '%s\n' "$status" > "$evidence/pytest-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Verify installed CLI smoke
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          {
            qso-run > "$evidence/qso-run.json" &&
            qso-run --config config/instances.json > "$evidence/qso-config.json" &&
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence = Path(os.environ["RUNNER_TEMP"]) / "qso-runtime-evidence"
          payload = json.loads((evidence / "qso-run.json").read_text(encoding="utf-8"))
          assert payload["status"] == "ok"
          assert payload["boundaries"] == {
              "credentials_access": False,
              "executes_generated_code": False,
              "external_content": "data_only",
              "network_access": False,
              "repository_write": False,
          }
          configured = json.loads((evidence / "qso-config.json").read_text(encoding="utf-8"))
          assert configured["configuration"]["primary_names"] == ["Atlas", "Nova", "Orion", "Lyra"]
          assert configured["configuration"]["genomes_resolved"] is False
          PY
            qso-run --version > "$evidence/qso-run-version.txt"
          } > "$evidence/smoke.log" 2>&1
          status=$?
          cat "$evidence/smoke.log"
          printf '%s\n' "$status" > "$evidence/smoke-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build wheel without isolation
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          dist="$RUNNER_TEMP/qso-runtime-dist"
          python -m pip wheel . --no-deps --no-build-isolation --wheel-dir "$dist" \
            > "$evidence/build.log" 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            sha256sum "$dist"/* > "$evidence/artifact-sha256.txt"
          fi
          cat "$evidence/build.log"
          printf '%s\n' "$status" > "$evidence/build-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/qso-runtime-evidence"
          python --version > "$evidence/python-version.txt" 2>&1
          python -m pip freeze --all > "$evidence/resolved-environment.txt" 2>&1 || true
          git status --porcelain --untracked-files=all > "$evidence/post-validation-status.txt"
          sha256sum \
            pyproject.toml \
            .github/workflows/ci.yml \
            > "$evidence/input-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code

      - name: Retain exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-runtime-evidence-${{ env.SUBMITTED_SHA }}-py${{ matrix.python-version }}
          path: |
            ${{ runner.temp }}/qso-runtime-evidence/
            ${{ runner.temp }}/qso-runtime-dist/
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on incomplete validation
        if: always()
        env:
          INSTALL_STATUS: ${{ steps.install.outputs.status }}
          COMPILE_STATUS: ${{ steps.compile.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
        shell: bash
        run: |
          set -euo pipefail
          test "$INSTALL_STATUS" = "0"
          test "$COMPILE_STATUS" = "0"
          test "$TEST_STATUS" = "0"
          test "$SMOKE_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
