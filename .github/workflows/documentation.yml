name: Documentation

on:
  pull_request:
    paths:
      - 'README.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'deploy.md'
      - 'mkdocs.yml'
      - 'docs/**'
      - 'contracts/qso-interface-source-tuple-v1.json'
      - 'fixtures/qso-interface-compatibility-v1.json'
      - 'tools/validate_fabric_interface_compatibility.py'
      - 'tests/test_fabric_interface_compatibility.py'
      - 'scripts/check_ecosystem_interface_compatibility.py'
      - 'tests/test_check_ecosystem_interface_compatibility.py'
      - '.github/workflows/fabric-interface-compatibility.yml'
      - '.github/workflows/ecosystem-interface-documentation.yml'
      - '.github/workflows/documentation.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'deploy.md'
      - 'mkdocs.yml'
      - 'docs/**'
      - 'contracts/qso-interface-source-tuple-v1.json'
      - 'fixtures/qso-interface-compatibility-v1.json'
      - 'tools/validate_fabric_interface_compatibility.py'
      - 'tests/test_fabric_interface_compatibility.py'
      - 'scripts/check_ecosystem_interface_compatibility.py'
      - 'tests/test_check_ecosystem_interface_compatibility.py'
      - '.github/workflows/fabric-interface-compatibility.yml'
      - '.github/workflows/ecosystem-interface-documentation.yml'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EXPECTED_FIXTURE_BLOB: 143b80448cb4623682669ab8e6a9599239dd5847
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          persist-credentials: false

      - name: Assert exact source and Fabric fixture identity
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test "$(git hash-object fixtures/qso-interface-compatibility-v1.json)" = "$EXPECTED_FIXTURE_BLOB"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Validate canonical interface architecture profile
        run: |
          python -m unittest -v tests/test_check_ecosystem_interface_compatibility.py
          python scripts/check_ecosystem_interface_compatibility.py \
            --report ecosystem-interface-profile-validation.json

      - name: Run independent Fabric interface regressions
        run: python -m unittest -v tests/test_fabric_interface_compatibility.py

      - name: Validate Fabric source tuple and compatibility corpus
        run: |
          python tools/validate_fabric_interface_compatibility.py \
            fixtures/qso-interface-compatibility-v1.json \
            contracts/qso-interface-source-tuple-v1.json \
            --repository-root . \
            > fabric-interface-validation.json

      - name: Prove validation did not mutate tracked source
        run: |
          set -euo pipefail
          git diff --exit-code
          git diff --cached --exit-code
          test "$(git hash-object fixtures/qso-interface-compatibility-v1.json)" = "$EXPECTED_FIXTURE_BLOB"

      - name: Install pinned documentation dependencies
        run: |
          python -m pip install --disable-pip-version-check -r docs/requirements.txt
          python -m pip freeze --all | sort > documentation-dependencies.txt

      - name: Build documentation strictly
        run: python -m mkdocs build --strict --clean

      - name: Validate generated site boundary
        run: |
          test -f site/index.html
          test -f site/sitemap.xml
          test -f site/search/search_index.json
          test ! -e site/.git
          ! grep -RIlE '(BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|gh[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,})' site

      - name: Record exact-head documentation evidence
        if: always()
        run: |
          mkdir -p reports/documentation/site
          if [ -d site ]; then cp -R site/. reports/documentation/site/; fi
          printf '%s\n' "$EXPECTED_HEAD_SHA" > reports/documentation/exact-head.txt
          printf '%s\n' "$EXPECTED_FIXTURE_BLOB" > reports/documentation/fabric-fixture-blob.txt
          python --version > reports/documentation/python-version.txt 2>&1
          python -m mkdocs --version > reports/documentation/mkdocs-version.txt 2>&1 || true
          cp documentation-dependencies.txt reports/documentation/dependencies.txt 2>/dev/null || true
          cp ecosystem-interface-profile-validation.json reports/documentation/ecosystem-interface-profile-validation.json 2>/dev/null || true
          cp fabric-interface-validation.json reports/documentation/fabric-interface-validation.json 2>/dev/null || true
          sha256sum \
            docs/ecosystem-interface-compatibility.md \
            docs/ecosystem-interface-compatibility-v0.json \
            docs/ecosystem-interface-compatibility-review-checklist.md \
            docs/decisions/0001-ecosystem-interface-compatibility-boundary.md \
            contracts/qso-interface-source-tuple-v1.json \
            fixtures/qso-interface-compatibility-v1.json \
            scripts/check_ecosystem_interface_compatibility.py \
            tests/test_check_ecosystem_interface_compatibility.py \
            tools/validate_fabric_interface_compatibility.py \
            tests/test_fabric_interface_compatibility.py \
            .github/workflows/fabric-interface-compatibility.yml \
            .github/workflows/ecosystem-interface-documentation.yml \
            .github/workflows/documentation.yml \
            > reports/documentation/interface-source-sha256.txt
          find reports/documentation -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > reports/documentation/SHA256SUMS

      - name: Upload documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: documentation-${{ env.EXPECTED_HEAD_SHA }}
          path: reports/documentation
          if-no-files-found: error
          retention-days: 90
