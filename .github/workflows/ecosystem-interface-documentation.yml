name: Ecosystem Interface Documentation

on:
  pull_request:
    paths:
      - 'docs/ecosystem-interface-compatibility.md'
      - 'docs/ecosystem-interface-compatibility-v0.json'
      - 'docs/ecosystem-interface-compatibility-review-checklist.md'
      - 'docs/decisions/0001-ecosystem-interface-compatibility-boundary.md'
      - 'contracts/qso-interface-source-tuple-v1.json'
      - 'fixtures/qso-interface-compatibility-v1.json'
      - 'scripts/check_ecosystem_interface_compatibility.py'
      - 'tests/test_check_ecosystem_interface_compatibility.py'
      - 'tools/validate_fabric_interface_compatibility.py'
      - 'tests/test_fabric_interface_compatibility.py'
      - '.github/workflows/ecosystem-interface-documentation.yml'
      - '.github/workflows/fabric-interface-compatibility.yml'
      - 'README.md'
      - 'mkdocs.yml'
      - 'docs/index.md'
      - 'docs/design-contracts.md'
      - 'taskchain.md'
      - 'punchlist.md'
      - 'release.md'
      - 'changelog.md'
  push:
    branches: [main]
    paths:
      - 'docs/ecosystem-interface-compatibility.md'
      - 'docs/ecosystem-interface-compatibility-v0.json'
      - 'docs/ecosystem-interface-compatibility-review-checklist.md'
      - 'docs/decisions/0001-ecosystem-interface-compatibility-boundary.md'
      - 'contracts/qso-interface-source-tuple-v1.json'
      - 'fixtures/qso-interface-compatibility-v1.json'
      - 'scripts/check_ecosystem_interface_compatibility.py'
      - 'tests/test_check_ecosystem_interface_compatibility.py'
      - 'tools/validate_fabric_interface_compatibility.py'
      - 'tests/test_fabric_interface_compatibility.py'
      - '.github/workflows/ecosystem-interface-documentation.yml'
      - '.github/workflows/fabric-interface-compatibility.yml'
      - 'README.md'
      - 'mkdocs.yml'
      - 'docs/index.md'
      - 'docs/design-contracts.md'
      - 'taskchain.md'
      - 'punchlist.md'
      - 'release.md'
      - 'changelog.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-interface-documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EXPECTED_FIXTURE_BLOB: 143b80448cb4623682669ab8e6a9599239dd5847
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          persist-credentials: false

      - name: Assert exact source and fixture identity
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test "$(git hash-object fixtures/qso-interface-compatibility-v1.json)" = "$EXPECTED_FIXTURE_BLOB"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'

      - name: Run canonical profile regressions
        run: python -m unittest -v tests/test_check_ecosystem_interface_compatibility.py

      - name: Run independent corpus regressions
        run: python -m unittest -v tests/test_fabric_interface_compatibility.py

      - name: Validate canonical profile and independent consumer
        run: |
          mkdir -p reports/ecosystem-interface-documentation
          python scripts/check_ecosystem_interface_compatibility.py \
            --report reports/ecosystem-interface-documentation/profile-validation.json
          python tools/validate_fabric_interface_compatibility.py \
            fixtures/qso-interface-compatibility-v1.json \
            contracts/qso-interface-source-tuple-v1.json \
            --repository-root . \
            > reports/ecosystem-interface-documentation/consumer-validation.json

      - name: Record immutable evidence
        if: always()
        run: |
          mkdir -p reports/ecosystem-interface-documentation
          printf '%s\n' "$EXPECTED_HEAD_SHA" \
            > reports/ecosystem-interface-documentation/exact-head.txt
          printf '%s\n' "$EXPECTED_FIXTURE_BLOB" \
            > reports/ecosystem-interface-documentation/fixture-blob.txt
          python --version \
            > reports/ecosystem-interface-documentation/python-version.txt 2>&1
          sha256sum \
            docs/ecosystem-interface-compatibility.md \
            docs/ecosystem-interface-compatibility-v0.json \
            docs/ecosystem-interface-compatibility-review-checklist.md \
            docs/decisions/0001-ecosystem-interface-compatibility-boundary.md \
            contracts/qso-interface-source-tuple-v1.json \
            fixtures/qso-interface-compatibility-v1.json \
            scripts/check_ecosystem_interface_compatibility.py \
            tests/test_check_ecosystem_interface_compatibility.py \
            tools/validate_fabric_interface_compatibility.py \
            tests/test_fabric_interface_compatibility.py \
            .github/workflows/ecosystem-interface-documentation.yml \
            .github/workflows/fabric-interface-compatibility.yml \
            > reports/ecosystem-interface-documentation/input-sha256.txt
          find reports/ecosystem-interface-documentation -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > reports/ecosystem-interface-documentation/SHA256SUMS

      - name: Upload interface documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ecosystem-interface-documentation-${{ env.EXPECTED_HEAD_SHA }}
          path: reports/ecosystem-interface-documentation
          if-no-files-found: error
          retention-days: 90

      - name: Fail closed on source mutation
        run: |
          set -euo pipefail
          test "$(git hash-object fixtures/qso-interface-compatibility-v1.json)" = "$EXPECTED_FIXTURE_BLOB"
          test -z "$(git status --porcelain --untracked-files=no)"
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
